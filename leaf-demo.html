<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaf Physics Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0A0F0D; }
        canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1; }
        .spacer {
            height: 400vh;
            position: relative;
            z-index: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 100vh;
            padding: 50vh 2rem;
        }
        .spacer h2 {
            color: rgba(124,144,130,0.3);
            font-family: sans-serif;
            font-size: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="spacer">
        <h2>Scroll to see leaves respond</h2>
        <h2>Faster scroll = more wind</h2>
        <h2>Leaves drift with your movement</h2>
    </div>
    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let W, H;

        function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
        resize();
        addEventListener('resize', resize);

        const LEAF_COUNT = 30;
        const GRAVITY = 0.015;

        const leafColors = [
            { r: 90, g: 130, b: 75 },    // live oak dark
            { r: 110, g: 150, b: 85 },   // live oak mid
            { r: 75, g: 115, b: 65 },    // magnolia dark
            { r: 100, g: 140, b: 80 },   // magnolia mid
            { r: 130, g: 160, b: 100 },  // lighter green
            { r: 120, g: 145, b: 90 },   // sage-ish
        ];

        let time = 0;
        let scrollVel = 0;
        let lastScrollY = 0;

        window.addEventListener('scroll', () => {
            scrollVel = (window.scrollY - lastScrollY);
            lastScrollY = window.scrollY;
        });

        function createLeafTexture(size, color, opacity, type) {
            const pad = 6;
            const dim = Math.ceil(size * 3) + pad * 2;
            const off = document.createElement('canvas');
            off.width = dim;
            off.height = dim;
            const c = off.getContext('2d');
            const cx = dim / 2;
            const cy = dim / 2;
            const s = size;
            const { r, g, b } = color;

            c.save();
            c.translate(cx, cy);

            // Gradient fill for all leaves
            const grad = c.createLinearGradient(0, -s, 0, s);
            grad.addColorStop(0, `rgba(${r + 15}, ${g + 15}, ${b + 10}, ${opacity})`);
            grad.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${opacity})`);
            grad.addColorStop(1, `rgba(${r - 10}, ${g - 10}, ${b - 8}, ${opacity * 0.9})`);
            c.fillStyle = grad;

            if (type === 0) {
                // Live Oak leaf — elongated oval, smooth edges, rounded tip, 3:1 ratio
                c.beginPath();
                c.moveTo(0, -s * 1.1); // tip (slightly rounded)
                // Right side — smooth elongated curve
                c.bezierCurveTo(s * 0.12, -s * 1.05, s * 0.28, -s * 0.8, s * 0.33, -s * 0.4);
                c.bezierCurveTo(s * 0.35, -s * 0.1, s * 0.34, s * 0.2, s * 0.3, s * 0.5);
                c.bezierCurveTo(s * 0.25, s * 0.7, s * 0.15, s * 0.85, 0, s * 0.95);
                // Left side — mirror
                c.bezierCurveTo(-s * 0.15, s * 0.85, -s * 0.25, s * 0.7, -s * 0.3, s * 0.5);
                c.bezierCurveTo(-s * 0.34, s * 0.2, -s * 0.35, -s * 0.1, -s * 0.33, -s * 0.4);
                c.bezierCurveTo(-s * 0.28, -s * 0.8, -s * 0.12, -s * 1.05, 0, -s * 1.1);
                c.closePath();
                c.fill();

                // Midrib
                c.strokeStyle = `rgba(${r - 20}, ${g - 15}, ${b - 20}, ${opacity * 0.5})`;
                c.lineWidth = 0.8;
                c.beginPath(); c.moveTo(0, -s * 1.05); c.lineTo(0, s * 0.9); c.stroke();
                // Side veins — gentle curves angling toward tip
                c.strokeStyle = `rgba(${r - 15}, ${g - 10}, ${b - 15}, ${opacity * 0.3})`;
                c.lineWidth = 0.4;
                const veins = [-0.7, -0.35, 0, 0.3, 0.55];
                for (const v of veins) {
                    const vy = v * s;
                    const spread = s * 0.28 * (1 - Math.abs(v) * 0.4);
                    c.beginPath(); c.moveTo(0, vy);
                    c.quadraticCurveTo(spread * 0.6, vy - s * 0.06, spread, vy - s * 0.1);
                    c.stroke();
                    c.beginPath(); c.moveTo(0, vy);
                    c.quadraticCurveTo(-spread * 0.6, vy - s * 0.06, -spread, vy - s * 0.1);
                    c.stroke();
                }

            } else if (type === 1) {
                // Southern Magnolia — broader oval, glossy, wider proportions ~2.5:1
                c.beginPath();
                c.moveTo(0, -s * 1.0);
                // Right side — wider curve
                c.bezierCurveTo(s * 0.2, -s * 0.9, s * 0.42, -s * 0.55, s * 0.45, -s * 0.1);
                c.bezierCurveTo(s * 0.43, s * 0.25, s * 0.35, s * 0.55, s * 0.2, s * 0.75);
                c.bezierCurveTo(s * 0.1, s * 0.85, s * 0.05, s * 0.9, 0, s * 0.95);
                // Left side
                c.bezierCurveTo(-s * 0.05, s * 0.9, -s * 0.1, s * 0.85, -s * 0.2, s * 0.75);
                c.bezierCurveTo(-s * 0.35, s * 0.55, -s * 0.43, s * 0.25, -s * 0.45, -s * 0.1);
                c.bezierCurveTo(-s * 0.42, -s * 0.55, -s * 0.2, -s * 0.9, 0, -s * 1.0);
                c.closePath();
                c.fill();

                // Glossy highlight
                const hlGrad = c.createRadialGradient(-s * 0.08, -s * 0.2, 0, -s * 0.08, -s * 0.2, s * 0.5);
                hlGrad.addColorStop(0, `rgba(255, 255, 255, ${opacity * 0.08})`);
                hlGrad.addColorStop(1, `rgba(255, 255, 255, 0)`);
                c.fillStyle = hlGrad;
                c.fill();

                // Midrib
                c.strokeStyle = `rgba(${r - 20}, ${g - 15}, ${b - 20}, ${opacity * 0.5})`;
                c.lineWidth = 0.9;
                c.beginPath(); c.moveTo(0, -s * 0.95); c.lineTo(0, s * 0.9); c.stroke();
                // Side veins
                c.strokeStyle = `rgba(${r - 15}, ${g - 10}, ${b - 15}, ${opacity * 0.3})`;
                c.lineWidth = 0.4;
                for (let v = -0.6; v < 0.7; v += 0.22) {
                    const spread = s * 0.38 * (1 - Math.abs(v) * 0.5);
                    c.beginPath(); c.moveTo(0, v * s);
                    c.quadraticCurveTo(spread * 0.5, (v - 0.07) * s, spread, (v - 0.13) * s);
                    c.stroke();
                    c.beginPath(); c.moveTo(0, v * s);
                    c.quadraticCurveTo(-spread * 0.5, (v - 0.07) * s, -spread, (v - 0.13) * s);
                    c.stroke();
                }

            } else {
                // Sabal Palm leaflet — narrow, long, slightly curved, pointed tip
                c.beginPath();
                c.moveTo(0, -s * 1.2); // sharp tip
                // Right side — very narrow
                c.bezierCurveTo(s * 0.04, -s * 1.1, s * 0.14, -s * 0.6, s * 0.16, -s * 0.1);
                c.bezierCurveTo(s * 0.15, s * 0.3, s * 0.12, s * 0.6, s * 0.08, s * 0.85);
                c.lineTo(0, s * 0.95);
                // Left side
                c.lineTo(-s * 0.08, s * 0.85);
                c.bezierCurveTo(-s * 0.12, s * 0.6, -s * 0.15, s * 0.3, -s * 0.16, -s * 0.1);
                c.bezierCurveTo(-s * 0.14, -s * 0.6, -s * 0.04, -s * 1.1, 0, -s * 1.2);
                c.closePath();
                c.fill();

                // Center fold/ridge
                c.strokeStyle = `rgba(${r - 15}, ${g - 10}, ${b - 15}, ${opacity * 0.45})`;
                c.lineWidth = 0.6;
                c.beginPath(); c.moveTo(0, -s * 1.15); c.lineTo(0, s * 0.9); c.stroke();
                // Parallel lines (palm leaf texture)
                c.strokeStyle = `rgba(${r - 10}, ${g - 8}, ${b - 10}, ${opacity * 0.15})`;
                c.lineWidth = 0.3;
                for (let off = -0.08; off <= 0.08; off += 0.04) {
                    if (Math.abs(off) < 0.01) continue;
                    c.beginPath();
                    c.moveTo(off * s, -s * 1.0);
                    c.lineTo(off * s, s * 0.8);
                    c.stroke();
                }
            }

            // Stem (petiole)
            c.strokeStyle = `rgba(${r - 25}, ${g - 20}, ${b - 25}, ${opacity * 0.5})`;
            c.lineWidth = 0.7;
            c.beginPath();
            c.moveTo(0, s * 0.9);
            c.quadraticCurveTo(s * 0.02, s * 1.05, s * 0.04, s * 1.2);
            c.stroke();

            c.restore();
            return { canvas: off, cx, cy };
        }

        class Leaf {
            constructor(startOnScreen) {
                this.size = 8 + Math.random() * 14;
                this.color = leafColors[Math.floor(Math.random() * leafColors.length)];
                this.opacity = 0.2 + Math.random() * 0.35;
                this.shape = Math.floor(Math.random() * 3);
                this.depth = 0.4 + Math.random() * 0.6;
                this.texture = createLeafTexture(this.size, this.color, this.opacity, this.shape);
                this.reset(startOnScreen);
            }

            reset(startOnScreen = false) {
                if (startOnScreen) {
                    this.x = Math.random() * W;
                    this.y = Math.random() * H;
                } else {
                    const side = Math.random();
                    if (side < 0.7) {
                        this.x = Math.random() * W * 1.2 - W * 0.1;
                        this.y = -30 - Math.random() * 100;
                    } else {
                        this.x = -30;
                        this.y = Math.random() * H * 0.5;
                    }
                }

                this.vx = 0;
                this.vy = 0.4 + Math.random() * 0.8;
                this.angle = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.03;
                this.tumble = Math.random() * Math.PI * 2;
                this.tumbleSpeed = 0.008 + Math.random() * 0.025;
                this.swayPhase = Math.random() * Math.PI * 2;
                this.swayFreq = 0.006 + Math.random() * 0.01;
                this.swayAmp = 0.2 + Math.random() * 0.5;
                this.drag = 0.985 + Math.random() * 0.01;
                this.windSensitivity = 0.4 + Math.random() * 0.8;
            }

            update(windX, windY) {
                this.vy += GRAVITY * this.depth;

                const sway = Math.sin(this.swayPhase) * this.swayAmp;
                this.swayPhase += this.swayFreq;

                this.vx += (windX * this.windSensitivity * this.depth + sway - this.vx) * 0.015;
                this.vy += windY * this.windSensitivity * this.depth * 0.01;

                this.vx *= this.drag;
                this.vy *= this.drag;

                this.vy = Math.max(-3, Math.min(this.vy, 2.5));
                this.vx = Math.max(-3, Math.min(this.vx, 3));

                this.x += this.vx;
                this.y += this.vy;

                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                this.tumble += this.tumbleSpeed + speed * 0.005;
                this.angle += this.rotSpeed + this.vx * 0.005;
                this.rotSpeed += (Math.random() - 0.5) * 0.001;
                this.rotSpeed *= 0.995;

                if (this.y > H + 40 || this.x > W + 60 || this.x < -60 || this.y < -200) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                const tumbleScale = Math.cos(this.tumble);
                ctx.scale(tumbleScale * this.depth, this.depth);
                ctx.drawImage(this.texture.canvas, -this.texture.cx, -this.texture.cy);
                ctx.restore();
            }
        }

        const leaves = [];
        for (let i = 0; i < LEAF_COUNT; i++) {
            leaves.push(new Leaf(true));
        }

        let smoothScrollVel = 0;

        function animate() {
            ctx.clearRect(0, 0, W, H);

            time++;

            smoothScrollVel += (scrollVel - smoothScrollVel) * 0.1;
            scrollVel *= 0.9;

            const gustX = Math.sin(time * 0.002) * 0.6 + Math.sin(time * 0.0057) * 0.3;
            const scrollWindX = smoothScrollVel * 0.15;
            const scrollWindY = -smoothScrollVel * 0.5;

            const totalWindX = 0.2 + gustX + scrollWindX;
            const totalWindY = scrollWindY;

            for (const leaf of leaves) {
                leaf.update(totalWindX, totalWindY);
                leaf.draw();
            }

            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body></html>
